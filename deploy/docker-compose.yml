# FadStream server core
# One command to bring up the whole self-hosted stack:
#   cd deploy && docker compose up --build
#
# Services:
#   mediamtx       - media core: WHIP/WebRTC + SRT + RTMP ingest, WHEP playback, server-side recording
#   control-plane  - device registry, auth, WSS command bus, MediaMTX auth hook
#   postgres       - device + recording metadata
#   minio          - S3-compatible object store for recorded segments
#   web            - WHEP dashboard (static, served by nginx)

name: fadstream

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fadstream
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-prod}
      POSTGRES_DB: fadstream
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../server/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fadstream"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-fadstream}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-change-me-in-prod}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console

  # One-shot: create the recordings bucket on startup.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_USER:-fadstream} ${MINIO_PASSWORD:-change-me-in-prod}; do sleep 2; done;
      mc mb --ignore-existing local/fadstream-recordings;
      echo 'bucket ready'
      "

  recordings-uploader:
    build: ../server/control-plane
    restart: unless-stopped
    command: ["node", "dist/uploader.js"]
    depends_on:
      - minio
      - control-plane
    environment:
      RECORDINGS_DIR: /recordings
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: fadstream-recordings
      S3_ACCESS_KEY: ${MINIO_USER:-fadstream}
      S3_SECRET_KEY: ${MINIO_PASSWORD:-change-me-in-prod}
      CONTROL_PLANE_URL: http://control-plane:8080
    volumes:
      - recordings:/recordings

  control-plane:
    build: ../server/control-plane
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://fadstream:${POSTGRES_PASSWORD:-change-me-in-prod}@postgres:5432/fadstream
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PORT: "8080"
    ports:
      # Host 8090 (8080 is commonly taken by other local servers, e.g. nginx);
      # container still listens on 8080 internally.
      - "8090:8080"   # REST + WSS control bus + MediaMTX auth hook

  # TURN/STUN relay: used when direct connection + hole-punching fail
  # (symmetric NAT, strict firewalls, mobile carrier CGNAT). Media relays
  # through here so a connection can ALWAYS be established.
  #
  # For a real public deployment:
  #   1. Set TURN_PUBLIC_IP to the server's public IP.
  #   2. Open UDP/TCP 3478 and the UDP relay range 49160-49200 in your firewall.
  #   3. Point mediamtx (webrtcICEServers2) and the Android client at it.
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host    # TURN needs the real host network to relay properly
    command: >
      -n
      --listening-port=3478
      --realm=fadstream
      --fingerprint
      --lt-cred-mech
      --user=fadstream:${TURN_PASSWORD:-change-me-in-prod}
      --min-port=49160
      --max-port=49200
      --no-tls
      --no-dtls
      --external-ip=${TURN_PUBLIC_IP:-127.0.0.1}

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    depends_on:
      - control-plane
    volumes:
      - ../server/mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - recordings:/recordings
    ports:
      - "8554:8554"     # RTSP
      - "1935:1935"     # RTMP
      - "8888:8888"     # HLS
      - "8889:8889"     # WebRTC (WHIP ingest / WHEP playback)
      - "8890:8890/udp" # SRT
      - "8189:8189/udp" # WebRTC ICE/UDP

  web:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - mediamtx
      - control-plane
    volumes:
      - ../web:/usr/share/nginx/html:ro
    ports:
      - "8081:80"

volumes:
  pgdata:
  miniodata:
  recordings:
