name: Build Android APK

# Builds the debug APK on GitHub's runners and publishes it as a downloadable
# artifact + a "latest" prerelease so you can install and test it on a phone.
on:
  push:
    branches: [ main ]
    paths: [ "android/**", ".github/workflows/android.yml" ]
  workflow_dispatch: {}   # lets you trigger a build manually from the Actions tab

permissions:
  contents: write          # needed to publish the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk out/FadStream-debug.apk
          echo "APK_SIZE=$(du -h out/FadStream-debug.apk | cut -f1)" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FadStream-debug-apk
          path: out/FadStream-debug.apk
          if-no-files-found: error

      - name: Publish 'latest' prerelease with APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest debug build"
          body: |
            Automated debug build of the FadStream Android app (${{ env.APK_SIZE }}).
            Download `FadStream-debug.apk` below, enable "install from unknown
            sources", and sideload it on your phone to test.
          prerelease: true
          files: out/FadStream-debug.apk
